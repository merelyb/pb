<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendrier examens</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { overflow: hidden; }

  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: #191919;
    color: #e8e8e8;
    padding: 20px;
    min-height: 100vh;
  }

  .wrap { max-width: 540px; margin: 0 auto; }

  /* ── Header ── */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .month-label {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: #e8e8e8;
    text-transform: capitalize;
  }

  .nav-btn {
    background: none;
    border: 0.5px solid #333;
    border-radius: 6px;
    color: #aaa;
    width: 30px; height: 30px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, color 0.15s;
  }
  .nav-btn:hover { border-color: #555; color: #e8e8e8; }

  /* ── Grid ── */
  .day-names {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
  }

  .day-name {
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    color: #555;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .day-cell {
    aspect-ratio: 1;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #777;
    cursor: default;
    position: relative;
    transition: background 0.1s;
  }

  .day-cell.current-month { color: #ccc; }
  .day-cell.today {
    background: #2a2a2a;
    color: #fff;
    font-weight: 600;
  }
  .day-cell.today::after {
    content: '';
    position: absolute;
    bottom: 4px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #f97316;
  }

  .day-cell.has-exam { cursor: pointer; }
  .day-cell.has-exam:hover { background: #242424; }

  .exam-dot {
    position: absolute;
    bottom: 4px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #60a5fa;
  }

  .day-cell.today .exam-dot { background: #f97316; bottom: 4px; }

  /* ── Divider ── */
  .divider {
    border: none;
    border-top: 0.5px solid #262626;
    margin: 20px 0;
  }

  /* ── Add exam ── */
  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: #555;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  input[type="text"], input[type="date"] {
    background: #222;
    border: 0.5px solid #333;
    border-radius: 6px;
    color: #e8e8e8;
    font-size: 13px;
    font-family: inherit;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    color-scheme: dark;
  }

  input[type="text"] { flex: 1; }
  input[type="date"] { width: 140px; }

  input[type="text"]::placeholder { color: #444; }
  input:focus { border-color: #555; }

  .add-btn {
    background: #f97316;
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 14px;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.85; }

  /* ── Exam list ── */
  .exam-list { display: flex; flex-direction: column; gap: 6px; }

  .exam-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    background: #212121;
    border: 0.5px solid #2a2a2a;
    border-radius: 7px;
    transition: border-color 0.15s;
  }

  .exam-item:hover { border-color: #333; }

  .exam-left { display: flex; align-items: center; gap: 10px; }

  .exam-dot-big {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #60a5fa;
    flex-shrink: 0;
  }

  .exam-name {
    font-size: 13px;
    color: #ddd;
    font-weight: 500;
  }

  .exam-date-tag {
    font-size: 11px;
    color: #666;
    margin-left: 2px;
  }

  .exam-days-left {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
    background: #2a2a2a;
    color: #888;
  }

  .exam-days-left.soon { background: #2d1f0e; color: #f97316; }
  .exam-days-left.today-tag { background: #1a2a1a; color: #4ade80; }
  .exam-days-left.past { color: #444; }

  .delete-btn {
    background: none;
    border: none;
    color: #3a3a3a;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 0 0 8px;
    transition: color 0.15s;
  }
  .delete-btn:hover { color: #888; }

  .empty-state {
    text-align: center;
    padding: 20px;
    color: #3a3a3a;
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="cal-header">
    <button class="nav-btn" id="prevBtn">&#8249;</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="nav-btn" id="nextBtn">&#8250;</button>
  </div>

  <div class="day-names" id="dayNames"></div>
  <div class="cal-grid" id="calGrid"></div>

  <hr class="divider">

  <p class="section-label">Ajouter un examen</p>
  <div class="add-row">
    <input type="text" id="examName" placeholder="Nom de l'examen" maxlength="40" />
    <input type="date" id="examDate" />
    <button class="add-btn" id="addBtn">Ajouter</button>
  </div>

  <div class="exam-list" id="examList"></div>
</div>

<script>
  const DAYS = ['Lu', 'Ma', 'Me', 'Je', 'Ve', 'Sa', 'Di'];
  const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  let exams = JSON.parse(localStorage.getItem('exams') || '[]');
  let now = new Date();
  let viewYear = now.getFullYear();
  let viewMonth = now.getMonth();

  function saveExams() { localStorage.setItem('exams', JSON.stringify(exams)); }

  function toYMD(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function daysLeft(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const exam = new Date(dateStr + 'T00:00:00');
    return Math.round((exam - today) / 86400000);
  }

  function renderDayNames() {
    const el = document.getElementById('dayNames');
    el.innerHTML = DAYS.map(d => `<div class="day-name">${d}</div>`).join('');
  }

  function renderCalendar() {
    document.getElementById('monthLabel').textContent = MONTHS[viewMonth] + ' ' + viewYear;
    const grid = document.getElementById('calGrid');
    const todayStr = toYMD(now);
    const examDates = new Set(exams.map(e => e.date));

    const first = new Date(viewYear, viewMonth, 1);
    let startDow = first.getDay();
    startDow = startDow === 0 ? 6 : startDow - 1;

    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();

    let cells = '';

    for (let i = startDow - 1; i >= 0; i--) {
      cells += `<div class="day-cell">${daysInPrev - i}</div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = viewYear + '-' + String(viewMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      const isToday = dateStr === todayStr;
      const hasExam = examDates.has(dateStr);
      let cls = 'day-cell current-month';
      if (isToday) cls += ' today';
      if (hasExam) cls += ' has-exam';
      cells += `<div class="${cls}" data-date="${dateStr}">${d}${hasExam ? '<div class="exam-dot"></div>' : ''}</div>`;
    }

    const totalCells = startDow + daysInMonth;
    const remainder = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let d = 1; d <= remainder; d++) {
      cells += `<div class="day-cell">${d}</div>`;
    }

    grid.innerHTML = cells;
  }

  function renderExams() {
    const el = document.getElementById('examList');
    const sorted = [...exams].sort((a, b) => a.date.localeCompare(b.date));
    if (sorted.length === 0) {
      el.innerHTML = '<div class="empty-state">Aucun examen ajouté</div>';
      return;
    }
    el.innerHTML = sorted.map((e, i) => {
      const dl = daysLeft(e.date);
      let tagCls = 'exam-days-left';
      let tagTxt = '';
      if (dl < 0) { tagCls += ' past'; tagTxt = 'passé'; }
      else if (dl === 0) { tagCls += ' today-tag'; tagTxt = "aujourd'hui"; }
      else if (dl <= 7) { tagCls += ' soon'; tagTxt = `J-${dl}`; }
      else { tagTxt = `J-${dl}`; }

      const dateObj = new Date(e.date + 'T00:00:00');
      const dateLabel = dateObj.getDate() + ' ' + MONTHS[dateObj.getMonth()].slice(0,3) + '.';

      return `<div class="exam-item">
        <div class="exam-left">
          <div class="exam-dot-big"></div>
          <span class="exam-name">${e.name}</span>
          <span class="exam-date-tag">${dateLabel}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="${tagCls}">${tagTxt}</span>
          <button class="delete-btn" onclick="deleteExam(${exams.indexOf(e)})">×</button>
        </div>
      </div>`;
    }).join('');
  }

  function deleteExam(idx) {
    exams.splice(idx, 1);
    saveExams();
    renderCalendar();
    renderExams();
  }

  document.getElementById('addBtn').addEventListener('click', () => {
    const name = document.getElementById('examName').value.trim();
    const date = document.getElementById('examDate').value;
    if (!name || !date) return;
    exams.push({ name, date });
    saveExams();
    document.getElementById('examName').value = '';
    document.getElementById('examDate').value = '';
    renderCalendar();
    renderExams();
  });

  document.getElementById('examName').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('addBtn').click();
  });

  document.getElementById('prevBtn').addEventListener('click', () => {
    viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCalendar();
  });

  renderDayNames();
  renderCalendar();
  renderExams();
</script>
</body>
</html>
