<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barre de progression</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { overflow: hidden; }

  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: #191919;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 28px 20px;
  }

  .container { width: 100%; max-width: 560px; }

  .title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 28px;
  }

  #titleText {
    font-size: 15px;
    font-weight: 600;
    color: #e8e8e8;
    cursor: text;
    outline: none;
    border-bottom: 1.5px dashed transparent;
    transition: border-color 0.15s;
    padding-bottom: 1px;
  }

  #titleText:hover { border-color: #f59e0b; }
  #titleText:focus { border-color: #f59e0b; }

  .edit-hint {
    font-size: 11px;
    color: #444;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .track-wrap {
    position: relative;
    padding-top: 0;
    cursor: pointer;
    user-select: none;
    touch-action: none;
  }

  .track {
    position: relative;
    height: 28px;
    border-radius: 99px;
    background: #2e2e2e;
    overflow: visible;
  }

  .fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    border-radius: 99px;
    background: linear-gradient(90deg, #f97316 0%, #fbbf24 100%);
    overflow: hidden;
    min-width: 0;
    transition: width 0.06s linear;
  }

  .fill::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 8px,
      rgba(255,255,255,0.22) 8px,
      rgba(255,255,255,0.22) 16px
    );
  }

  .fill::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 0; height: 45%;
    background: rgba(255,255,255,0.18);
    border-radius: 99px 99px 0 0;
  }

  .badge {
    position: absolute;
    top: 0;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    transition: left 0.06s linear;
  }

  .badge-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(145deg, #fbbf24, #f97316);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    box-shadow: 0 2px 12px rgba(249,115,22,0.6);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }

  .badge-arrow {
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 8px solid #f97316;
    margin-top: -1px;
  }


</style>
</head>
<body>
<div class="container">

  <div class="title-row">
    <span id="titleText" contenteditable="true" spellcheck="false">Ma progression</span>
    <span class="edit-hint" id="editHint">← clique pour modifier</span>
  </div>

  <div class="track-wrap" id="trackWrap">

    <div class="track" id="track">
      <div class="fill" id="fill" style="width: 0%">
        <span id="pctText" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:11px; font-weight:700; color:rgba(255,255,255,0.9); font-variant-numeric:tabular-nums; letter-spacing:0.01em; pointer-events:none; white-space:nowrap;">0%</span>
      </div>
    </div>
  </div>


</div>

<script>
  const track = document.getElementById('track');
  const fill = document.getElementById('fill');
  const trackWrap = document.getElementById('trackWrap');

  let isDragging = false;

  function getValFromEvent(e) {
    const rect = track.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    return Math.round(Math.min(100, Math.max(0, (x / rect.width) * 100)));
  }

  const pctText = document.getElementById('pctText');

  function setVal(v) {
    fill.style.width = v + '%';
    const label = v + '%';
    pctText.textContent = label;
    pctText.style.opacity = v < 12 ? '0' : '1';
  }

  trackWrap.addEventListener('mousedown', e => {
    if (e.target.closest('[contenteditable]')) return;
    isDragging = true;
    setVal(getValFromEvent(e));
  });
  document.addEventListener('mousemove', e => { if (isDragging) setVal(getValFromEvent(e)); });
  document.addEventListener('mouseup', () => { isDragging = false; });

  trackWrap.addEventListener('touchstart', e => {
    isDragging = true;
    setVal(getValFromEvent(e));
    e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', e => {
    if (isDragging) { setVal(getValFromEvent(e)); e.preventDefault(); }
  }, { passive: false });
  document.addEventListener('touchend', () => { isDragging = false; });

  const titleEl = document.getElementById('titleText');
  const hintEl = document.getElementById('editHint');
  titleEl.addEventListener('focus', () => { hintEl.style.opacity = '0'; });
  titleEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); } });
</script>
</body>
</html>
